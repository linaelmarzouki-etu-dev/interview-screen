<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Activate License</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-page">
  <main class="login-card">
    <h1>MCQ Companion</h1>
    <p class="subtitle">Enter your 8-letter license key to continue</p>

    <form id="login-form" class="login-form">
      <label for="license-key">License key</label>
      <input
        id="license-key"
        type="text"
        maxlength="8"
        autocapitalize="characters"
        autocomplete="off"
        spellcheck="false"
        placeholder="ABCDEFGH"
        required
      />
      <button type="submit" class="primary">Activate</button>
    </form>

    <p id="login-error" class="login-error hidden"></p>

    <section class="plan-hints">
      <h2>Plans</h2>
      <ul>
        <li><strong>24h</strong> — 100 questions</li>
        <li><strong>7d</strong> — 500 questions</li>
        <li><strong>30d</strong> — 2000 questions</li>
      </ul>
    </section>
  </main>

  <script src="/static/auth.js"></script>
  <script src="/static/login.js"></script>
</body>
</html>
